<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EduTrack — Student Management</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root { --bg: #0a0a0f; --card: #13131a; --border: #2a2a3a; --accent: #6c63ff; --accent2: #ff6584; --text: #e8e8f0; --muted: #6b6b8a; }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; min-height: 100vh; }
  header { padding: 24px 40px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 12px; }
  header h1 { font-family: 'DM Serif Display', serif; font-size: 28px; background: linear-gradient(135deg, var(--accent), var(--accent2)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
  header span { color: var(--muted); font-size: 14px; }
  .tabs { display: flex; gap: 4px; padding: 20px 40px 0; border-bottom: 1px solid var(--border); }
  .tab { padding: 10px 24px; border-radius: 8px 8px 0 0; cursor: pointer; font-weight: 500; color: var(--muted); transition: all 0.2s; border: 1px solid transparent; border-bottom: none; }
  .tab.active { color: var(--text); background: var(--card); border-color: var(--border); }
  .tab:hover:not(.active) { color: var(--text); }
  .page { display: none; padding: 32px 40px; }
  .page.active { display: block; }
  .grid { display: grid; grid-template-columns: 360px 1fr; gap: 24px; }
  .card { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 24px; }
  .card h2 { font-family: 'DM Serif Display', serif; font-size: 20px; margin-bottom: 20px; }
  .form-group { margin-bottom: 14px; }
  label { display: block; font-size: 11px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 6px; }
  input, select { width: 100%; padding: 10px 14px; background: var(--bg); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 14px; outline: none; transition: border 0.2s; }
  input:focus, select:focus { border-color: var(--accent); }
  button.btn { background: var(--accent); color: white; border: none; padding: 11px 20px; border-radius: 8px; cursor: pointer; font-family: 'DM Sans', sans-serif; font-weight: 600; font-size: 14px; width: 100%; margin-top: 8px; transition: all 0.2s; }
  button.btn:hover { background: #5a52e0; transform: translateY(-1px); }
  table { width: 100%; border-collapse: collapse; }
  th { text-align: left; font-size: 11px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; padding: 0 16px 12px; }
  td { padding: 12px 16px; border-top: 1px solid var(--border); font-size: 14px; }
  tr:hover td { background: rgba(108,99,255,0.05); }
  .badge { display: inline-block; padding: 3px 10px; border-radius: 20px; font-size: 12px; font-weight: 600; background: rgba(108,99,255,0.15); color: var(--accent); }
  .del-btn { background: none; border: none; color: var(--muted); cursor: pointer; font-size: 20px; line-height: 1; transition: color 0.2s; }
  .del-btn:hover { color: var(--accent2); }
  .empty { text-align: center; padding: 40px; color: var(--muted); font-size: 14px; }
</style>
</head>
<body>
<header>
  <h1>EduTrack</h1>
  <span>/ Student Management System</span>
</header>
<div class="tabs">
  <div class="tab active" onclick="showTab('students')">👤 Students</div>
  <div class="tab" onclick="showTab('courses')">📚 Courses</div>
  <div class="tab" onclick="showTab('enrollments')">📋 Enrollments</div>
</div>
<div class="page active" id="tab-students">
  <div class="grid">
    <div class="card">
      <h2>Add Student</h2>
      <div class="form-group"><label>Full Name</label><input id="s-name" placeholder="John Doe"></div>
      <div class="form-group"><label>Email</label><input id="s-email" placeholder="john@example.com"></div>
      <div class="form-group"><label>Age</label><input id="s-age" type="number" placeholder="20"></div>
      <button class="btn" onclick="addStudent()">+ Add Student</button>
    </div>
    <div class="card">
      <h2>All Students</h2>
      <table><thead><tr><th>Name</th><th>Email</th><th>Age</th><th></th></tr></thead>
      <tbody id="students-table"><tr><td colspan="4" class="empty">No students yet</td></tr></tbody></table>
    </div>
  </div>
</div>
<div class="page" id="tab-courses">
  <div class="grid">
    <div class="card">
      <h2>Add Course</h2>
      <div class="form-group"><label>Course Title</label><input id="c-title" placeholder="Web Development"></div>
      <div class="form-group"><label>Description</label><input id="c-desc" placeholder="Learn HTML, CSS, JS"></div>
      <div class="form-group"><label>Credits</label><input id="c-credits" type="number" placeholder="3"></div>
      <button class="btn" onclick="addCourse()">+ Add Course</button>
    </div>
    <div class="card">
      <h2>All Courses</h2>
      <table><thead><tr><th>Title</th><th>Description</th><th>Credits</th><th></th></tr></thead>
      <tbody id="courses-table"><tr><td colspan="4" class="empty">No courses yet</td></tr></tbody></table>
    </div>
  </div>
</div>
<div class="page" id="tab-enrollments">
  <div class="grid">
    <div class="card">
      <h2>Enroll Student</h2>
      <div class="form-group"><label>Student</label><select id="e-student"><option>-- select --</option></select></div>
      <div class="form-group"><label>Course</label><select id="e-course"><option>-- select --</option></select></div>
      <div class="form-group"><label>Grade</label><input id="e-grade" placeholder="A, B, C..."></div>
      <button class="btn" onclick="addEnrollment()">+ Enroll</button>
    </div>
    <div class="card">
      <h2>All Enrollments</h2>
      <table><thead><tr><th>Student</th><th>Course</th><th>Grade</th><th></th></tr></thead>
      <tbody id="enrollments-table"><tr><td colspan="4" class="empty">No enrollments yet</td></tr></tbody></table>
    </div>
  </div>
</div>
<script>
function showTab(name) {
  document.querySelectorAll('.tab').forEach((t,i) => t.classList.toggle('active', ['students','courses','enrollments'][i]===name));
  document.querySelectorAll('.page').forEach(p => p.classList.toggle('active', p.id===`tab-${name}`));
  if(name==='enrollments') { loadStudentOptions(); loadCourseOptions(); }
}
async function loadStudents() {
  const data = await fetch('/api/students').then(r=>r.json());
  const tb = document.getElementById('students-table');
  tb.innerHTML = data.length ? data.map(s=>`<tr><td>${s.name}</td><td>${s.email}</td><td><span class="badge">${s.age}</span></td><td><button class="del-btn" onclick="del('students',${s.id})">×</button></td></tr>`).join('') : '<tr><td colspan="4" class="empty">No students yet</td></tr>';
}
async function loadCourses() {
  const data = await fetch('/api/courses').then(r=>r.json());
  const tb = document.getElementById('courses-table');
  tb.innerHTML = data.length ? data.map(c=>`<tr><td>${c.title}</td><td>${c.description||'-'}</td><td><span class="badge">${c.credits} cr</span></td><td><button class="del-btn" onclick="del('courses',${c.id})">×</button></td></tr>`).join('') : '<tr><td colspan="4" class="empty">No courses yet</td></tr>';
}
async function loadEnrollments() {
  const data = await fetch('/api/enrollments').then(r=>r.json());
  const tb = document.getElementById('enrollments-table');
  tb.innerHTML = data.length ? data.map(e=>`<tr><td>${e.student}</td><td>${e.course}</td><td><span class="badge">${e.grade||'N/A'}</span></td><td><button class="del-btn" onclick="del('enrollments',${e.id})">×</button></td></tr>`).join('') : '<tr><td colspan="4" class="empty">No enrollments yet</td></tr>';
}
async function loadStudentOptions() {
  const data = await fetch('/api/students').then(r=>r.json());
  document.getElementById('e-student').innerHTML = data.map(s=>`<option value="${s.id}">${s.name}</option>`).join('');
}
async function loadCourseOptions() {
  const data = await fetch('/api/courses').then(r=>r.json());
  document.getElementById('e-course').innerHTML = data.map(c=>`<option value="${c.id}">${c.title}</option>`).join('');
}
async function addStudent() {
  const name=document.getElementById('s-name').value, email=document.getElementById('s-email').value, age=document.getElementById('s-age').value;
  if(!name||!email) return alert('Name and email required');
  await fetch('/api/students',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({name,email,age})});
  document.getElementById('s-name').value=document.getElementById('s-email').value=document.getElementById('s-age').value='';
  loadStudents();
}
async function addCourse() {
  const title=document.getElementById('c-title').value, description=document.getElementById('c-desc').value, credits=document.getElementById('c-credits').value;
  if(!title) return alert('Title required');
  await fetch('/api/courses',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({title,description,credits})});
  document.getElementById('c-title').value=document.getElementById('c-desc').value=document.getElementById('c-credits').value='';
  loadCourses();
}
async function addEnrollment() {
  const student_id=document.getElementById('e-student').value, course_id=document.getElementById('e-course').value, grade=document.getElementById('e-grade').value;
  if(!student_id||!course_id) return alert('Select student and course');
  await fetch('/api/enrollments',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({student_id,course_id,grade})});
  document.getElementById('e-grade').value='';
  loadEnrollments();
}
async function del(type, id) {
  await fetch(`/api/${type}/${id}`,{method:'DELETE'});
  if(type==='students') loadStudents();
  else if(type==='courses') loadCourses();
  else loadEnrollments();
}
loadStudents(); loadCourses(); loadEnrollments();
</script>
</body>
</html>
